<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--room-100); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .icon { background: var(--room-50); border: 1px solid var(--border); border-radius: 6px; aspect-ratio: 1; display: grid; place-items: center;}
  svg { width: 22px; height: 22px; stroke: var(--ink-900); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round;}
  .note { margin-top: 14px; font-size: 12px; color: var(--ink-500); font-family: var(--font-mono);}
</style>
</head>
<body>
  <div class="grid">
    <!-- container -->
    <div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="12" rx="1"/><path d="M7 7v12M11 7v12M15 7v12M19 7v12"/></svg></div>
    <!-- map pin -->
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M20 10c0 5-8 12-8 12s-8-7-8-12a8 8 0 1116 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
    <!-- euro (correct) -->
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M18.5 6.5A7 7 0 007 12a7 7 0 0011.5 5.5"/><path d="M4 10.5h9M4 13.5h9"/></svg></div>
    <!-- key -->
    <div class="icon"><svg viewBox="0 0 24 24"><circle cx="8" cy="15" r="4"/><path d="M11 12l9-9M17 6l3 3M14 9l3 3"/></svg></div>
    <!-- clock -->
    <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
    <!-- doc -->
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V9z"/><path d="M14 3v6h6"/></svg></div>
    <!-- shield -->
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6l8-3z"/></svg></div>
    <!-- arrow -->
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
  </div>
  <div class="note">Lucide icons · stroke 1.5 · currentColor · 16/20/24px</div>
</body>
</html>
