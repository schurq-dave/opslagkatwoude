<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 24px; background: var(--room-100); }
  .stack > * + * { margin-top: 16px; }
  .specimen { line-height: 1.1; margin: 0; color: var(--ink-900); font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em;}
  .meta { font-family: var(--font-sans); font-size: 11px; color: var(--ink-500); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; margin-top: 6px;}
  em { font-style: normal; display: inline-block; background: var(--oker-500); color: var(--ink-900); padding: 0 14px; transform: skew(-2deg); }
  em > span { display: inline-block; transform: skew(2deg); }
  .flag { font-family: var(--font-sans); font-size: 11px; color: #8A7137; background: #F5ECD4; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-top: 4px;}
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="specimen" style="font-size: 56px;">Gewoon een <em><span>container.</span></em></div>
      <div class="meta">DM Sans · 700 · 56 / 60 · tracking -0.025em · highlight op signatuurwoord</div>
    </div>
    <div>
      <div class="specimen" style="font-size: 36px;">Naast Hotel <em><span>Katwoude.</span></em></div>
      <div class="meta">DM Sans · 700 · 36 / 44</div>
    </div>
    <div>
      <div class="specimen" style="font-size: 22px; font-weight: 600;">Tussen de weilanden.</div>
      <div class="meta">DM Sans · 600 · 22 / 28</div>
    </div>
  </div>
</body>
</html>
