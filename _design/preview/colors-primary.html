<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--room-100); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .swatch { border-radius: 6px; overflow: hidden; border: 1px solid var(--border); background: var(--room-50); }
  .chip { height: 72px; }
  .meta-row { padding: 10px 12px 12px; }
  .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px;}
  .name { font-size: 13px; font-weight: 600; color: var(--ink-900); font-family: var(--font-sans);}
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); }
  .role { font-size: 10px; color: var(--ink-500); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; margin-top: 2px;}
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#2E3F2A"></div>
      <div class="meta-row">
        <div class="top"><span class="name">Diepgroen</span><span class="hex">#2E3F2A</span></div>
        <div class="role">primair · weiland</div>
      </div>
    </div>
    <div class="swatch"><div class="chip" style="background:#1F1C18"></div>
      <div class="meta-row">
        <div class="top"><span class="name">Anker</span><span class="hex">#1F1C18</span></div>
        <div class="role">tekst · natte aarde</div>
      </div>
    </div>
    <div class="swatch"><div class="chip" style="background:#C9A961"></div>
      <div class="meta-row">
        <div class="top"><span class="name">Gerijpt oker</span><span class="hex">#C9A961</span></div>
        <div class="role">accent · koolzaad</div>
      </div>
    </div>
    <div class="swatch"><div class="chip" style="background:#F2ECE0"></div>
      <div class="meta-row">
        <div class="top"><span class="name">Warm room</span><span class="hex">#F2ECE0</span></div>
        <div class="role">basis · linnen</div>
      </div>
    </div>
  </div>
</body>
</html>
