<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--room-100); font-family: var(--font-sans); color: var(--ink-900); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .row:last-child { margin-bottom: 0; }
  .label { font-size: 11px; color: var(--ink-500); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; width: 96px; }

  /* ---- Pill CTA (de huisknop) ---------------------------------- */
  .pill {
    font-family: var(--font-sans); font-size: 15px; font-weight: 600; line-height: 1;
    padding: 16px 22px 16px 26px; border-radius: 999px; border: 0; cursor: pointer;
    display: inline-flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 20px rgba(31,28,24,0.15);
    background: var(--ink-900); color: var(--room-50);
  }
  .pill.accent { background: var(--oker-600); color: var(--ink-900); box-shadow: 0 8px 20px rgba(201,169,97,0.35); }
  .pill.small { padding: 12px 18px 12px 22px; font-size: 14px; }

  .pill .dot {
    width: 26px; height: 26px; border-radius: 999px;
    background: var(--oker-600); color: var(--ink-900);
    display: grid; place-items: center;
  }
  .pill.accent .dot { background: var(--ink-900); color: var(--room-50); }
  .pill.small .dot { width: 22px; height: 22px; }

  /* ---- Secundair ----------------------------------------------- */
  .btn-ghost {
    font-family: var(--font-sans); font-size: 15px; font-weight: 500;
    padding: 15px 22px; border-radius: 999px; cursor: pointer;
    background: transparent; color: var(--ink-900); border: 1px solid var(--border);
  }
  .btn-text {
    font-family: var(--font-sans); font-size: 15px; font-weight: 500;
    background: transparent; color: var(--ink-900); border: 0; padding: 16px 8px;
    text-decoration: underline; text-underline-offset: 4px; cursor: pointer;
  }

  /* Donkere preview-strip */
  .dark-strip { background: var(--green-800); margin: 0 -28px; padding: 20px 28px; border-radius: 0; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Primair</span>
    <button class="pill">
      Reserveer container
      <span class="dot"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </button>
    <button class="pill small">
      Volgende stap
      <span class="dot"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </button>
  </div>

  <div class="row">
    <span class="label">Accent</span>
    <button class="pill accent">
      Boek nu
      <span class="dot"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </button>
    <button class="pill accent small">
      Bevestigen
      <span class="dot"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </button>
  </div>

  <div class="row">
    <span class="label">Secundair</span>
    <button class="btn-ghost">Meer informatie</button>
    <button class="btn-text">Of bekijk de werkwijze</button>
  </div>
</body>
</html>
