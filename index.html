<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Opslag Katwoude — Opslag nodig?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="icon" href="assets/mark.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; background: #2E3F2A; }
    #root { min-height: 100vh; }
    a { color: inherit; }

    /* ==== Pill CTA ==== */
    .ok-pill {
      font-family: inherit; font-weight: 600;
      border: 0; border-radius: 999px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 12px;
      line-height: 1; font-size: 15px;
      padding: 16px 22px 16px 26px;
      transition: transform 160ms ease, box-shadow 220ms ease;
    }
    .ok-pill--sm { font-size: 14px; padding: 12px 18px 12px 22px; gap: 10px; }
    .ok-pill--dark   { background: var(--ink-900);  color: var(--room-50); box-shadow: 0 8px 20px rgba(31,28,24,0.15); }
    .ok-pill--accent { background: var(--oker-600); color: var(--ink-900); box-shadow: 0 8px 20px rgba(31,28,24,0.15); }
    .ok-pill--flat   { box-shadow: none; }
    .ok-pill:hover   { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(31,28,24,0.22); }
    .ok-pill--flat:hover { box-shadow: 0 10px 24px rgba(0,0,0,0.25); }

    .ok-pill__dot {
      width: 26px; height: 26px; border-radius: 999px;
      display: grid; place-items: center;
      position: relative; overflow: hidden;
      transition: transform 220ms cubic-bezier(.34,1.2,.64,1);
    }
    .ok-pill--sm .ok-pill__dot { width: 22px; height: 22px; }
    .ok-pill--dark   .ok-pill__dot { background: var(--oker-600); color: var(--ink-900); }
    .ok-pill--accent .ok-pill__dot { background: var(--ink-900);  color: var(--room-50); }
    .ok-pill:hover .ok-pill__dot   { transform: translateX(4px); }
    .ok-pill:active .ok-pill__dot  { transform: translateX(6px); }
    .ok-pill__label { transition: transform 220ms ease; }
    .ok-pill:hover .ok-pill__label { transform: translateX(-2px); }

    /* ==== FAQ smooth open ==== */
    .ok-faq__body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 320ms cubic-bezier(.4,0,.2,1), opacity 260ms ease;
      opacity: 0;
    }
    .ok-faq__body--open { grid-template-rows: 1fr; opacity: 1; }
    .ok-faq__body > div { overflow: hidden; }
    .ok-faq__chev { transition: transform 280ms cubic-bezier(.4,0,.2,1); }
    .ok-faq__chev--open { transform: rotate(180deg); }

    /* ==== Card lift (subtle) ==== */
    .ok-lift { transition: transform 200ms ease, box-shadow 260ms ease; }
    .ok-lift:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(31,28,24,0.10); }

    /* ==== Mobile responsive ==== */
    @media (max-width: 960px) {
      /* Hero — vult viewport, alles in beeld */
      .ok-hero {
        min-height: 100svh !important;
        display: flex !important; align-items: flex-start !important;
        margin-top: -84px !important;
        padding-top: 84px !important;
        background:
          linear-gradient(180deg, rgba(46,63,42,0.6) 0%, rgba(46,63,42,0.3) 40%, rgba(46,63,42,0.75) 100%),
          url(assets/hero-container.png) top center / cover no-repeat !important;
      }
      .ok-hero-inner { padding: 120px 20px 40px !important; width: 100% !important; }
      .ok-hero-stats { grid-template-columns: repeat(2, 1fr) !important; column-gap: 24px !important; row-gap: 14px !important; }
      .ok-hero h1 { font-size: clamp(44px, 11vw, 60px) !important; margin-bottom: 16px !important; line-height: 1.04 !important; }
      .ok-hero-lede { font-size: 15px !important; line-height: 1.5 !important; }
      .ok-h2 { font-size: clamp(28px, 6.5vw, 38px) !important; line-height: 1.08 !important; }
      h2 { font-size: clamp(28px, 6.5vw, 38px) !important; }
      h3 { font-size: 18px !important; }
      .ok-hero-lede { font-size: 16px !important; margin-bottom: 20px !important; }
      .ok-hero-cta-row { margin-bottom: 24px !important; }
      .ok-hero-eyebrow { margin-bottom: 12px !important; }

      /* Header — iets lager op mobiel, hamburger aan */
      .ok-header { top: 12px !important; padding: 0 16px !important; }
      .ok-nav-links { display: none !important; }
      .ok-nav-search { display: none !important; }
      .ok-nav-burger { display: grid !important; }
      .ok-nav-drawer { display: block !important; }
      .ok-nav { padding: 8px 8px 8px 20px !important; gap: 10px !important; }
      .ok-nav-logo { height: 42px !important; }
      .ok-nav-cta { padding: 10px 16px !important; font-size: 13px !important; }

      /* Generic section padding */
      .ok-sec { padding: 64px 20px !important; }
      .ok-sec-inner { padding-left: 0 !important; padding-right: 0 !important; }

      /* Two-col layouts → single col */
      .ok-2col { grid-template-columns: 1fr !important; gap: 40px !important; }
      .ok-3col { grid-template-columns: 1fr !important; gap: 20px !important; }
      .ok-4col { grid-template-columns: repeat(2, 1fr) !important; gap: 24px !important; }

      /* Nav */
      .ok-nav-logo { height: 44px !important; }

      /* Headings scale */
      .ok-h2 { font-size: clamp(32px, 6vw, 40px) !important; }
      .ok-h2-big { font-size: clamp(36px, 7vw, 52px) !important; }

      /* Werkwijze — stack + solid overlay on mobile */
      .ok-werk { 
        background: linear-gradient(180deg, rgba(31,28,24,0.95) 0%, rgba(31,28,24,0.85) 100%), url(assets/containers-weiland.jpeg) center/cover no-repeat !important; 
        padding: 64px 20px !important; 
      }
      .ok-werk-grid { display: flex !important; flex-direction: column !important; gap: 32px !important; }
      .ok-werk-text { order: 1; }
      .ok-werk-steps { order: 2; }
      .ok-werk-cta { order: 3; }

      /* Propositie B numbered rows */
      .ok-prop-b-row { grid-template-columns: 64px 1fr !important; gap: 20px !important; padding: 24px 0 !important; }
      .ok-prop-b-row > :nth-child(2) { font-size: 28px !important; }
      .ok-prop-b-row > :nth-child(3) { grid-column: 1 / -1 !important; font-size: 15px !important; }
      .ok-prop-b-num { font-size: 44px !important; }

      /* Propositie C hero card */
      .ok-prop-c-hero { padding: 40px 28px !important; min-height: 340px !important; }
      .ok-prop-c-price { font-size: clamp(60px, 14vw, 84px) !important; }

      /* Container A/B/C */
      .ok-cont-a-price { font-size: 72px !important; }
      .ok-cont-b-head { grid-template-columns: 1fr !important; padding: 40px 24px !important; gap: 20px !important; }
      .ok-cont-b-price { font-size: 72px !important; padding: 4px 16px !important; }
      .ok-cont-b-features { padding: 28px 24px !important; grid-template-columns: 1fr !important; }
      .ok-cont-c { padding: 44px 24px !important; min-height: 480px !important; }
      .ok-cont-c h2 { font-size: clamp(36px, 8vw, 48px) !important; }
      .ok-cont-c-tag { top: 20px !important; right: 20px !important; }
      .ok-cont-c-grid { grid-template-columns: 1fr 1fr !important; }

      /* Plattegrond */
      .ok-plat-grid { display: flex !important; flex-direction: column !important; gap: 32px !important; }
      .ok-plat-left { display: contents !important; }
      .ok-plat-text { order: 1; }
      .ok-plat-map { order: 2; }
      .ok-plat-legend { order: 3; }
      .ok-plat-cta { order: 4; }
      .ok-plat-board { padding: 20px !important; }

      /* FAQ */
      .ok-faq-grid { grid-template-columns: 1fr !important; gap: 32px !important; }

      /* SocialProof */
      .ok-sp-grid { grid-template-columns: 1fr !important; gap: 16px !important; }

      /* Footer */
      .ok-foot { padding: 56px 20px 24px !important; }
      .ok-foot-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }

      /* Tweak panel — compact */
      .ok-tweak-panel { width: calc(100vw - 32px) !important; right: 16px !important; bottom: 16px !important; }

      /* Map aspect */
      .ok-map { aspect-ratio: 4 / 3 !important; }
    }

    @media (max-width: 560px) {
      .ok-foot-grid { grid-template-columns: 1fr !important; }
      .ok-hero-stats { grid-template-columns: 1fr 1fr !important; column-gap: 20px !important; }
      .ok-cont-c-grid { grid-template-columns: 1fr !important; }
      /* 4-col USP blijft 2x2 op mobiel, niet 1 kolom */
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ui_kits/website/Primitives.jsx"></script>

  <script type="text/babel">


/* =====================================================================
   Opslag Katwoude — Homepage (standalone)
   Gebouwd op design tokens uit colors_and_type.css + Primitives.jsx
   ===================================================================== */

const LOGO = 'assets/Opslagkatwoude.donker.svg';
const LOGO_I = 'assets/Opslagkatwoude.licht.svg';
const HERO = 'assets/hero-container.png';

/* --------------------------------------------------------------------
   TWEAKABLE DEFAULTS
   -------------------------------------------------------------------- */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "propositieVariant": "A",
  "containerVariant": "A"
}/*EDITMODE-END*/;

const TweakContext = React.createContext(TWEAK_DEFAULTS);
function useTweak(key) { return React.useContext(TweakContext)[key]; }

/* --------------------------------------------------------------------
   SHARED PRIMITIVES — hero-stijl in één plek gedefinieerd
   -------------------------------------------------------------------- */

/* Pill-CTA: zwart met inline oker pijl-cirkel. De huis-call-to-action. 
   Pijl schuift bij hover (micro-interaction). */
function PillCTA({ children, onDark = false, small = false, variant = 'dark' }) {
  const accent = variant === 'accent';
  const cls = [
    'ok-pill',
    small  ? 'ok-pill--sm'  : '',
    accent ? 'ok-pill--accent' : 'ok-pill--dark',
    onDark ? 'ok-pill--flat'   : '',
  ].filter(Boolean).join(' ');
  return (
    <button className={cls}>
      <span className="ok-pill__label">{children}</span>
      <span className="ok-pill__dot">
        <svg viewBox="0 0 24 24" width={small ? 12 : 14} height={small ? 12 : 14} fill="none"
          stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </span>
    </button>
  );
}

/* Highlight: oker skew-block om één signatuurwoord in een kop te laten knallen. */
function Highlight({ children, color = 'var(--oker-600)' }) {
  return (
    <span style={{
      display: 'inline-block',
      background: color,
      color: 'var(--ink-900)',
      padding: '0 16px',
      transform: 'skew(-2deg)',
      marginTop: 6,
      whiteSpace: 'nowrap',
    }}>
      <span style={{ display: 'inline-block', transform: 'skew(2deg)' }}>{children}</span>
    </span>
  );
}

/* Display heading — consistent bold DM Sans met optionele highlight. */
function DisplayH2({ children, dark = false, size = 52 }) {
  return (
    <h2 style={{
      fontFamily: 'var(--font-display)',
      fontSize: size, lineHeight: 1.05, letterSpacing: '-0.025em', fontWeight: 700,
      color: dark ? 'var(--room-50)' : 'var(--ink-900)',
      margin: '0 0 20px',
      textWrap: 'balance',
    }}>{children}</h2>
  );
}

/* --------------------------------------------------------------------
   HEADER — floating pill nav (LogCargo-stijl)
   -------------------------------------------------------------------- */
function Header() {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const link = (label, active = false) => (
    <a href="#" onClick={() => setMenuOpen(false)} style={{
      padding: '10px 6px', fontSize: 15,
      color: active ? 'var(--ink-900)' : 'var(--ink-700)',
      fontWeight: active ? 600 : 500, textDecoration: 'none',
      display: 'inline-flex', alignItems: 'center', gap: 6,
    }}>{label}</a>
  );
  const mobileLink = (label, active = false) => (
    <a href="#" onClick={() => setMenuOpen(false)} style={{
      padding: '16px 0', fontSize: 22, fontFamily: 'var(--font-display)',
      color: active ? 'var(--ink-900)' : 'var(--ink-700)',
      fontWeight: active ? 700 : 500, textDecoration: 'none',
      letterSpacing: '-0.01em',
      borderBottom: '1px solid var(--border)',
      display: 'block',
    }}>{label}</a>
  );

  return (
    <header className="ok-header" style={{
      position: 'sticky', top: 20, zIndex: 50,
      padding: '0 24px',
    }}>
      <div className="ok-nav" style={{
        maxWidth: 1280, margin: '0 auto',
        background: 'rgba(251,248,242,0.92)',
        border: '1px solid var(--border)',
        borderRadius: 999,
        padding: '10px 14px 10px 28px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 32,
        boxShadow: '0 8px 24px rgba(31,28,24,0.06), 0 2px 6px rgba(31,28,24,0.04)',
        backdropFilter: 'blur(10px)',
      }}>
        <a href="#" style={{ display: 'block' }}>
          <img src={LOGO} alt="Opslag Katwoude" className="ok-nav-logo" style={{ height: 52, display: 'block' }} />
        </a>
        <nav className="ok-nav-links" style={{ display: 'flex', gap: 32 }}>
          {link('Home', true)}
          {link('Werkwijze')}
          {link('Over ons')}
          {link('Contact')}
          {link('Blog')}
        </nav>
        <div className="ok-nav-actions" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button aria-label="Zoeken" className="ok-nav-search" style={{
            width: 40, height: 40, borderRadius: 999, border: '1px solid var(--border)',
            background: 'transparent', cursor: 'pointer', display: 'grid', placeItems: 'center',
            color: 'var(--ink-700)',
          }}>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
              <circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/>
            </svg>
          </button>
          <button className="ok-nav-cta" style={{
            fontFamily: 'inherit', fontSize: 14, fontWeight: 600,
            padding: '12px 22px', borderRadius: 999, border: 0, cursor: 'pointer',
            background: 'var(--ink-900)', color: 'var(--room-50)',
            display: 'inline-flex', alignItems: 'center', gap: 8,
          }}>
            Reserveer
            <span style={{
              width: 22, height: 22, borderRadius: 999, background: 'var(--oker-600)',
              display: 'grid', placeItems: 'center', color: 'var(--ink-900)',
            }}>
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </span>
          </button>
          {/* Hamburger — alleen zichtbaar op mobiel via CSS */}
          <button
            aria-label={menuOpen ? 'Menu sluiten' : 'Menu openen'}
            aria-expanded={menuOpen}
            onClick={() => setMenuOpen(o => !o)}
            className="ok-nav-burger"
            style={{
              width: 40, height: 40, borderRadius: 999, border: '1px solid var(--border)',
              background: menuOpen ? 'var(--ink-900)' : 'transparent', cursor: 'pointer',
              display: 'none', placeItems: 'center',
              color: menuOpen ? 'var(--room-50)' : 'var(--ink-900)',
              transition: 'background 200ms, color 200ms',
            }}>
            {menuOpen ? (
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <path d="M6 6l12 12M18 6L6 18"/>
              </svg>
            ) : (
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <path d="M4 7h16M4 12h16M4 17h16"/>
              </svg>
            )}
          </button>
        </div>
      </div>

      {/* Mobile drawer */}
      <div className="ok-nav-drawer" style={{
        display: 'none',
        maxWidth: 1280, margin: '12px auto 0',
        background: 'var(--room-50)',
        border: '1px solid var(--border)',
        borderRadius: 20,
        padding: menuOpen ? '8px 24px 20px' : '0 24px',
        maxHeight: menuOpen ? 500 : 0,
        opacity: menuOpen ? 1 : 0,
        overflow: 'hidden',
        transition: 'max-height 320ms cubic-bezier(.4,0,.2,1), opacity 240ms ease, padding 320ms ease',
        boxShadow: '0 8px 24px rgba(31,28,24,0.06)',
      }}>
        <nav style={{ display: 'flex', flexDirection: 'column' }}>
          {mobileLink('Home', true)}
          {mobileLink('Werkwijze')}
          {mobileLink('Over ons')}
          {mobileLink('Contact')}
          {mobileLink('Blog')}
        </nav>
      </div>
    </header>
  );
}

/* --------------------------------------------------------------------
   HERO — full-bleed weilandfoto met lichte gradient voor leesbaarheid
   -------------------------------------------------------------------- */
function Hero() {
  return (
    <section className="ok-hero" style={{
      position: 'relative',
      background: `
        linear-gradient(100deg, rgba(46,63,42,0.92) 0%, rgba(46,63,42,0.75) 32%, rgba(46,63,42,0.2) 60%, rgba(46,63,42,0) 100%),
        url(${HERO}) center/cover no-repeat
      `,
      overflow: 'hidden',
      minHeight: 680,
      marginTop: -84, /* hero loopt achter de floating nav door */
      paddingTop: 84,
    }}>
      <div className="ok-hero-inner" style={{
        maxWidth: 1320, margin: '0 auto',
        padding: '120px 32px 96px',
        position: 'relative', zIndex: 2,
      }}>
        <div style={{ maxWidth: 640 }}>
          <div className="ok-hero-eyebrow" style={{
            fontSize: 13, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase',
            color: 'var(--oker-600)', marginBottom: 20,
          }}>Katwoude · Lagedijk 9</div>

          <h1 style={{
            fontFamily: 'var(--font-display)',
            fontSize: 'clamp(48px, 5.5vw, 84px)',
            lineHeight: 1.02, letterSpacing: '-0.03em', fontWeight: 700,
            color: 'var(--room-50)', margin: '0 0 28px',
          }}>
            <Highlight>Opslag</Highlight> nodig?
          </h1>

          <p className="ok-hero-lede" style={{
            fontSize: 18, lineHeight: 1.6, color: 'var(--room-200)',
            maxWidth: 460, margin: '0 0 36px',
          }}>
            24 m². €175 per maand. Vandaag geregeld. In Katwoude, naast de N247, tussen de weilanden.
          </p>

          <div className="ok-hero-cta-row" style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 56 }}>
            <PillCTA>Reserveer container</PillCTA>
            <a href="#" style={{
              fontFamily: 'inherit', fontSize: 15, fontWeight: 500,
              padding: '16px 8px', color: 'var(--room-50)', textDecoration: 'underline',
              textUnderlineOffset: 4, display: 'inline-flex', alignItems: 'center',
            }}>Bekijk werkwijze</a>
          </div>

          <div className="ok-hero-stats" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, auto)', columnGap: 48, rowGap: 20, justifyContent: 'start' }}>
            <StatMini k="400+" v="Containers"/>
            <StatMini k="24/7" v="Toegang"/>
            <StatMini k="€0"   v="Borg"/>
            <StatMini k="Geen" v="Opzegtermijn"/>
          </div>
        </div>
      </div>
    </section>
  );
}

function StatMini({ k, v }) {
  return (
    <div>
      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 26, color: 'var(--room-50)', letterSpacing: '-0.02em' }}>{k}</div>
      <div style={{ fontSize: 13, color: 'var(--room-200)', marginTop: 2 }}>{v}</div>
    </div>
  );
}

/* --------------------------------------------------------------------
   PROPOSITIE — 3 varianten (Tweak: propositieVariant)
   A: iconen (baseline) · B: groot genummerd, tekst als held · C: asymmetrisch
   -------------------------------------------------------------------- */
function Propositie() {
  const variant = useTweak('propositieVariant') || 'A';
  const items = [
    { icon: 'mapPin', k: 'Dichtbij',   v: 'In Katwoude, naast de N247. Binnen 7 km van Volendam, Edam, Monnickendam en Purmerend.' },
    { icon: 'euro',   k: 'Voordelig',  v: '€175 per maand, alles inbegrepen. Scherpste prijs in de regio.' },
    { icon: 'clock',  k: 'Direct',     v: '24/7 online te regelen. Geen wachttijd, geen verkoopgesprek.' },
    { icon: 'shield', k: 'Degelijk',   v: '400+ zeecontainers, afgesloten terrein, duidelijke voorwaarden.' },
  ];

  if (variant === 'B') return <PropositieB items={items} />;
  if (variant === 'C') return <PropositieC items={items} />;
  return <PropositieA items={items} />;
}

/* A — de huidige: 4 kolommen, icoon naast titel */
function PropositieA({ items }) {
  return (
    <Section bg="room" py={96}>
      <div className="ok-4col" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 32 }}>
        {items.map((p) =>
          <div key={p.k}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <span style={{ color: 'var(--green-800)', display: 'inline-flex' }}><Icon name={p.icon} size={22} /></span>
              <h3 style={{ margin: 0 }}>{p.k}</h3>
            </div>
            <p style={{ margin: 0, fontSize: 15, color: 'var(--fg-muted)' }}>{p.v}</p>
          </div>
        )}
      </div>
    </Section>
  );
}

/* B — groot genummerd, zonder iconen. Tekst als held, veel lucht. */
function PropositieB({ items }) {
  return (
    <Section bg="room" py={112}>
      <div style={{ display: 'grid', gap: 0 }}>

/* Compacte iconen voor ContainerB */
function ContainerIcon({ name }) {
  const common = { width: 22, height: 22, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'squareM':  return <svg {...common}><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 16V8l2.5 4L12 8v8"/></svg>;
    case 'key':      return <svg {...common}><circle cx="8" cy="15" r="3"/><path d="M10 13l10-10M17 5l2 2M15 7l2 2"/></svg>;
    case 'clock':    return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case 'shield':   return <svg {...common}><path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6l8-3z"/></svg>;
    case 'calendar': return <svg {...common}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>;
    case 'euro':     return <svg {...common}><path d="M4 10h12M4 14h9M19 6a7.7 7.7 0 00-5.2-2A7.9 7.9 0 006 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></svg>;
    default: return null;
  }
}

/* Echte kaart — Leaflet met OSM tiles, gecentreerd op Lagedijk 9 Katwoude.
   Coordinaten 52.4698°N, 5.0267°E. De pin is een echte Leaflet marker, dus
   blijft op locatie ook bij zoomen/pannen. */
function KatwoudeMap() {
  const ref = React.useRef(null);
  const mapRef = React.useRef(null);

  React.useEffect(() => {
    if (!ref.current || mapRef.current) return;
    if (typeof window.L === 'undefined') return;

    const L = window.L;
    const lat = 52.4698;
    const lon = 5.0267;

    const map = L.map(ref.current, {
      center: [lat, lon],
      zoom: 13,
      zoomControl: true,
      scrollWheelZoom: false,
      attributionControl: true,
    });
    mapRef.current = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    /* Custom merk-pin — zwart met ocher dot, iets groter dan standaard */
    const pinHtml = `
      <div class="ok-pin-wrap">
        <div class="ok-pin-glow"></div>
        <svg width="40" height="52" viewBox="0 0 44 56" class="ok-pin-svg">
          <path d="M22 2C11 2 4 10 4 20c0 13 14 26 18 32 4-6 18-19 18-32 0-10-7-18-18-18z" fill="#1F1C18"/>
          <circle cx="22" cy="20" r="7" fill="#C9A961"/>
        </svg>
      </div>`;
    const icon = L.divIcon({
      html: pinHtml,
      className: 'ok-pin-icon',
      iconSize: [40, 52],
      iconAnchor: [20, 50],
      popupAnchor: [0, -48],
    });

    const marker = L.marker([lat, lon], { icon }).addTo(map);
    marker.bindPopup(
      `<div style="font-family:var(--font-display, DM Serif Display),serif;">
         <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#8A7B48;margin-bottom:4px;font-weight:600;">Opslag Katwoude</div>
         <div style="font-size:16px;font-weight:600;color:#1F1C18;line-height:1.1;">Lagedijk 9</div>
         <div style="font-size:13px;color:#66615A;margin-top:2px;">1145 PL Katwoude</div>
       </div>`,
      { closeButton: false, offset: [0, -8] }
    );

    /* Activeer scroll-zoom wanneer kaart focus heeft */
    map.on('click', () => map.scrollWheelZoom.enable());
    map.on('mouseout', () => map.scrollWheelZoom.disable());

    return () => { map.remove(); mapRef.current = null; };
  }, []);

  return (
    <div className="ok-map" style={{ position: 'relative', width: '100%', aspectRatio: '16 / 8', background: '#F3EEDD', overflow: 'hidden' }}>
      <div ref={ref} style={{ width: '100%', height: '100%' }} />

      {/* Corner label linksboven */}
      <div style={{
        position: 'absolute', top: 16, left: 16, zIndex: 500,
        background: 'var(--room-50)', border: '1px solid var(--border)',
        padding: '6px 12px', borderRadius: 999,
        fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase',
        color: 'var(--ink-700)',
        boxShadow: '0 2px 8px rgba(31,28,24,0.08)',
        pointerEvents: 'none',
      }}>
        Kaart · Katwoude
      </div>

      {/* Open in maps cta rechtsonder */}
      <a
        href="https://www.openstreetmap.org/?mlat=52.4698&mlon=5.0267#map=16/52.4698/5.0267"
        target="_blank" rel="noreferrer"
        style={{
          position: 'absolute', bottom: 16, right: 16, zIndex: 500,
          background: 'var(--ink-900)', color: 'var(--room-50)',
          padding: '10px 16px', borderRadius: 999,
          fontSize: 13, fontWeight: 600, textDecoration: 'none',
          display: 'inline-flex', alignItems: 'center', gap: 8,
          boxShadow: '0 6px 18px rgba(31,28,24,0.25)',
        }}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M7 17L17 7M17 7H8M17 7v9" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        Open in kaart
      </a>

      <style>{`
        .ok-pin-icon { background: transparent; border: 0; }
        .ok-pin-wrap { position: relative; width: 40px; height: 52px; }
        .ok-pin-svg {
          position: relative; z-index: 2;
          filter: drop-shadow(0 6px 10px rgba(31,28,24,0.35));
        }
        .ok-pin-glow {
          position: absolute; left: 50%; top: 18px;
          width: 80px; height: 80px; border-radius: 50%;
          transform: translate(-50%, -50%);
          background: radial-gradient(circle, rgba(201,169,97,0.55) 0%, rgba(201,169,97,0) 65%);
          animation: okPulse 2.4s ease-in-out infinite;
          z-index: 1; pointer-events: none;
        }
        @keyframes okPulse {
          0%, 100% { transform: translate(-50%, -50%) scale(0.75); opacity: 0.7; }
          50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }
        .leaflet-popup-content-wrapper {
          border-radius: 8px;
          border-left: 4px solid #C9A961;
          box-shadow: 0 10px 26px rgba(31,28,24,0.25);
          padding: 10px 14px 12px;
        }
        .leaflet-popup-content { margin: 0; }
        .leaflet-popup-tip { background: #FBF8F2; }
        .leaflet-container { font-family: inherit; background: #E9E1CF; }
      `}</style>
    </div>
  );
}

function Stars({ value = 5, size = 16 }) {
  const full = Math.floor(value);
  const half = value - full >= 0.5;
  const total = 5;
  return (
    <div style={{ display: 'inline-flex', gap: 2, color: 'var(--oker-600)' }}>
      {Array.from({ length: total }).map((_, i) => {
        const isFull = i < full;
        const isHalf = i === full && half;
        return (
          <svg key={i} viewBox="0 0 24 24" width={size} height={size}>
            <defs>
              <linearGradient id={`starhalf-${i}`}>
                <stop offset="50%" stopColor="currentColor" />
                <stop offset="50%" stopColor="#E5DCC7" />
              </linearGradient>
            </defs>
            <path
              d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              fill={isFull ? 'currentColor' : isHalf ? `url(#starhalf-${i})` : '#E5DCC7'}
            />
          </svg>
        );
      })}
    </div>
  );
}

      <span style={{ width: 24, height: 12, background: color, borderRadius: 2, flexShrink: 0 }} />
      <span style={{ fontSize: 14, color: 'var(--ink-900)', flex: 1 }}>{label}</span>
      <span style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: 'var(--ink-900)' }}>{count}</span>
    </div>
  );
}

/* --------------------------------------------------------------------
   TWEAK PANEL — switcher voor propositie & container varianten
   -------------------------------------------------------------------- */
function TweakPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const update = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <div className="ok-tweak-panel" style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 1000,
      width: 300,
      background: 'var(--ink-900)', color: 'var(--room-50)',
      borderRadius: 14, padding: 20,
      fontFamily: 'var(--font-display)',
      boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
      border: '1px solid rgba(255,255,255,0.08)',
    }}>
      <div style={{
        fontSize: 11, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase',
        color: 'var(--oker-600)', marginBottom: 16,
      }}>
        Tweaks
      </div>

      <TweakRow
        label="Propositie-sectie"
        value={tweaks.propositieVariant}
        options={[
          ['A', '4 koloms iconen'],
          ['B', 'Groot genummerd'],
          ['C', 'Asymmetrisch held'],
        ]}
        onChange={(v) => update('propositieVariant', v)}
      />
      <TweakRow
        label="Container-kaart"
        value={tweaks.containerVariant}
        options={[
          ['A', 'Prijskaart rechts'],
          ['B', 'Prijs als highlight'],
          ['C', 'Magazine foto'],
        ]}
        onChange={(v) => update('containerVariant', v)}
      />
    </div>
  );
}

function TweakRow({ label, value, options, onChange }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{
        fontSize: 12, fontWeight: 600, color: 'var(--room-200)',
        marginBottom: 8, fontFamily: 'var(--font-body, DM Sans)',
      }}>
        {label}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
        {options.map(([val, name]) => {
          const active = value === val;
          return (
            <button key={val} onClick={() => onChange(val)} style={{
              padding: '8px 6px',
              background: active ? 'var(--oker-600)' : 'rgba(255,255,255,0.06)',
              color: active ? 'var(--ink-900)' : 'var(--room-200)',
              border: 0, borderRadius: 8, cursor: 'pointer',
              fontFamily: 'inherit', fontWeight: 600, fontSize: 11,
              lineHeight: 1.3,
              textAlign: 'center',
            }}
              title={name}
            >
              <div style={{ fontSize: 14, fontWeight: 700 }}>{val}</div>
              <div style={{ fontSize: 10, opacity: 0.85, marginTop: 2 }}>{name}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* --------------------------------------------------------------------
   APP
   -------------------------------------------------------------------- */
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode')   setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  return (
    <TweakContext.Provider value={tweaks}>
      <Header />
      <Hero />
      <Propositie />
      <Container />
      <Werkwijze />
      <Plattegrond />
      <SocialProof />
      <Faq />
      <Locatie />
      <Footer />
      <TweakPanel tweaks={tweaks} setTweaks={setTweaks} visible={editMode} />
    </TweakContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
