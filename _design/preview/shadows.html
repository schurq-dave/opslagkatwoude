<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px 24px; background: var(--room-100); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .tile { background: var(--room-50); border-radius: 8px; padding: 22px 10px; text-align: center; }
  .tile.xs { box-shadow: 0 1px 1px rgba(31,28,24,0.04); }
  .tile.sm { box-shadow: 0 1px 2px rgba(31,28,24,0.06), 0 1px 3px rgba(31,28,24,0.04); }
  .tile.md { box-shadow: 0 2px 4px rgba(31,28,24,0.06), 0 4px 12px rgba(31,28,24,0.06); }
  .tile.lg { box-shadow: 0 8px 24px rgba(31,28,24,0.10), 0 2px 6px rgba(31,28,24,0.06); }
  .name { font-size: 11px; font-weight: 600; color: var(--ink-900); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;}
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-500); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile xs"><div class="name">XS</div><div class="meta">1px inner</div></div>
    <div class="tile sm"><div class="name">SM</div><div class="meta">cards rust</div></div>
    <div class="tile md"><div class="name">MD</div><div class="meta">cards hover</div></div>
    <div class="tile lg"><div class="name">LG</div><div class="meta">modals, menus</div></div>
  </div>
</body>
</html>
