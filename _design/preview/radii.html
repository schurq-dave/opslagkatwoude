<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--room-100); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tile { background: var(--room-50); border: 1px solid var(--border); padding: 14px; text-align: center; }
  .shape { margin: 0 auto 10px; width: 56px; height: 56px; background: var(--green-800); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-500); }
  .name { font-size: 11px; font-weight: 600; color: var(--ink-900); margin-bottom: 2px; letter-spacing: 0.04em; text-transform: uppercase;}
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><div class="shape" style="border-radius: 2px"></div><div class="name">XS</div><div class="meta">2px</div></div>
    <div class="tile"><div class="shape" style="border-radius: 4px"></div><div class="name">SM</div><div class="meta">4px</div></div>
    <div class="tile"><div class="shape" style="border-radius: 6px"></div><div class="name">MD</div><div class="meta">6px · default</div></div>
    <div class="tile"><div class="shape" style="border-radius: 10px"></div><div class="name">LG</div><div class="meta">10px</div></div>
    <div class="tile"><div class="shape" style="border-radius: 16px"></div><div class="name">XL</div><div class="meta">16px · hero</div></div>
    <div class="tile"><div class="shape" style="border-radius: 999px; width: 80px; height: 28px"></div><div class="name">Full</div><div class="meta">pill</div></div>
  </div>
</body>
</html>
