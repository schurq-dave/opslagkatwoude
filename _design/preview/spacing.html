<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--room-100); font-family: var(--font-sans); }
  .stack > * + * { margin-top: 12px; }
  .row { display: grid; grid-template-columns: 90px 1fr 70px; gap: 12px; align-items: center; padding: 6px 0;}
  .label { font-size: 11px; color: var(--ink-500); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .token { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); text-align: right; }
  .bar { background: var(--oker-600); height: 20px; border-radius: 2px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="label">1 · 4px</span>  <div class="bar" style="width: 4px"></div><span class="token">--space-1</span></div>
    <div class="row"><span class="label">2 · 8px</span>  <div class="bar" style="width: 8px"></div><span class="token">--space-2</span></div>
    <div class="row"><span class="label">3 · 12px</span> <div class="bar" style="width: 12px"></div><span class="token">--space-3</span></div>
    <div class="row"><span class="label">4 · 16px</span> <div class="bar" style="width: 16px"></div><span class="token">--space-4</span></div>
    <div class="row"><span class="label">5 · 24px</span> <div class="bar" style="width: 24px"></div><span class="token">--space-5</span></div>
    <div class="row"><span class="label">6 · 32px</span> <div class="bar" style="width: 32px"></div><span class="token">--space-6</span></div>
    <div class="row"><span class="label">7 · 48px</span> <div class="bar" style="width: 48px"></div><span class="token">--space-7</span></div>
    <div class="row"><span class="label">8 · 64px</span> <div class="bar" style="width: 64px"></div><span class="token">--space-8</span></div>
    <div class="row"><span class="label">9 · 96px</span> <div class="bar" style="width: 96px"></div><span class="token">--space-9</span></div>
  </div>
</body>
</html>
