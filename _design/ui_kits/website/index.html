<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Opslag Katwoude — website UI kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/mark.svg">
<style>
  html, body { margin: 0; background: #FBF8F2; }
  #root { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="WerkwijzePage.jsx"></script>
<script type="text/babel" src="ContactPage.jsx"></script>
<script type="text/babel" src="BlogPages.jsx"></script>
<script type="text/babel" src="BoekenPage.jsx"></script>

<script type="text/babel">
function App() {
  const saved = (() => { try { return localStorage.getItem('ok_path') || 'home'; } catch(e) { return 'home'; } })();
  const [page, setPage] = React.useState(saved);
  const [blogSlug, setBlogSlug] = React.useState(null);

  const go = (p, slug) => {
    setPage(p);
    if (slug) setBlogSlug(slug);
    try { localStorage.setItem('ok_path', p); } catch(e) {}
    window.scrollTo({top: 0});
  };

  return (
    <div data-screen-label="Opslag Katwoude — website">
      <Header currentPath={page === 'blog-detail' ? 'blog' : page} onNavigate={go}/>
      {page === 'home' && <HomePage onNavigate={go}/>}
      {page === 'werkwijze' && <WerkwijzePage onNavigate={go}/>}
      {page === 'contact' && <ContactPage/>}
      {page === 'blog' && <BlogListPage onNavigate={go}/>}
      {page === 'blog-detail' && <BlogDetailPage slug={blogSlug} onNavigate={go}/>}
      {page === 'boeken' && <BoekenPage onNavigate={go}/>}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
