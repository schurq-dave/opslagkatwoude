<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<title>Mobile Preview — Opslag Katwoude</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #E9E5DD;
    min-height: 100vh;
    font-family: var(--font-sans, system-ui);
    color: var(--ink-900, #1F1C18);
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 48px 24px 80px;
    box-sizing: border-box;
  }
  .header {
    text-align: center;
    max-width: 560px;
  }
  .header h1 {
    font-family: var(--font-display, Georgia);
    font-size: 40px;
    letter-spacing: -0.03em;
    margin: 0 0 10px;
  }
  .header p {
    margin: 0;
    font-size: 15px;
    color: rgba(31,28,24,0.6);
    line-height: 1.5;
  }
  .device-wrap {
    /* holds the absolute-positioned iframe */
  }
  /* Phone shell — iPhone-style rounded rectangle */
  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    border-radius: 54px;
    background: #000;
    padding: 12px;
    box-sizing: border-box;
    box-shadow:
      0 40px 80px rgba(0,0,0,0.22),
      0 0 0 1px rgba(0,0,0,0.14),
      inset 0 0 0 2px rgba(255,255,255,0.04);
  }
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 42px;
    overflow: hidden;
    background: #E9E5DD;
  }
  /* Dynamic island */
  .island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    border-radius: 24px;
    background: #000;
    z-index: 50;
  }
  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 100px;
    background: rgba(0,0,0,0.25);
    z-index: 60;
    pointer-events: none;
  }
  /* iframe at 375px logical width, scaled if needed */
  .screen iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: transparent;
  }
  .note {
    max-width: 600px;
    font-size: 13px;
    color: rgba(31,28,24,0.5);
    text-align: center;
    line-height: 1.6;
  }
  .note strong { color: rgba(31,28,24,0.8); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Mobiele weergave</h1>
      <p>Homepage van Opslag Katwoude op iPhone-breedte (390px). Je kunt hieronder scrollen in het telefoonvenster om de hele pagina te doorlopen.</p>
    </div>

    <div class="device-wrap">
      <div class="phone">
        <div class="screen">
          <div class="island"></div>
          <iframe src="Opslag Katwoude - Homepage.html" title="Mobile preview"></iframe>
          <div class="home-indicator"></div>
        </div>
      </div>
    </div>

    <div class="note">
      Tip: scroll binnen het telefoonvenster om de hele pagina te zien. Meld je bevindingen per sectie &mdash; dan pas ik die gericht aan.
    </div>
  </div>
</body>
</html>
