<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--room-100); }
  .logo-wrap { background: var(--room-50); border: 1px solid var(--border); border-radius: 8px; padding: 28px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;}
  .logo-wrap.dark { background: var(--green-800); border-color: var(--green-700);}
  img { display: block; height: 64px; }
  .row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="logo-wrap"><img src="../assets/logo.svg" alt="Opslag Katwoude"></div>
    <div class="logo-wrap dark"><img src="../assets/logo-inverse.svg" alt="Opslag Katwoude"></div>
  </div>
</body>
</html>
